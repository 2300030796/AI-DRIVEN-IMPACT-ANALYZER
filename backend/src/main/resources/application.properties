# ============================================================
# AI-Driven-Impact-Analyzer — Application Configuration
# ============================================================

# Server
server.port=8080
spring.application.name=ai-impact-analyzer

# ============================================================
# MySQL Database
# ============================================================
spring.datasource.url=jdbc:mysql://mysqldb:3306/impact_analyzer?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true&createDatabaseIfNotExist=true
spring.datasource.username=root
spring.datasource.password=root
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# Connection pool
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.idle-timeout=600000
spring.datasource.hikari.max-lifetime=1800000

# ============================================================
# JPA / Hibernate
# ============================================================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false

# ============================================================
# Multipart Upload
# ============================================================
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=50MB
spring.servlet.multipart.max-request-size=100MB
spring.servlet.multipart.file-size-threshold=2KB

# ============================================================
# Ollama AI Engine
# ============================================================
ollama.base-url=http://localhost:11434
ollama.model=llama3
ollama.timeout-seconds=180
ollama.max-prompt-chars=8000
ollama.retry-count=1

# ============================================================
# Git / JGit Settings
# ============================================================
git.temp-dir=/tmp/impact-analyzer-repos
git.clone-timeout-seconds=120
git.supported-extensions=.java,.js,.ts,.txt,.py,.kt,.go,.cs

# ============================================================
# Logging
# ============================================================
logging.level.com.impact=INFO
logging.level.org.springframework.web=WARN
logging.level.org.hibernate.SQL=WARN
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n



# ============================================================
# CORS Configuration
# ============================================================
